<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE JIVER | Data Harvester Alpha</title>
    <style>
        :root {
            --bg-black: #000000;
            --gold-muted: #c5a059;
            --gold-bright: #e7c17d;
            --text-main: #ffffff;
            --border-dim: #333333;
            --font-size-main: 20px;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            font-size: var(--font-size-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            border-bottom: 2px solid var(--gold-muted);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            z-index: 10;
        }

        .logo {
            color: var(--gold-bright);
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            flex-grow: 1;
            height: calc(100vh - 70px);
        }

        aside {
            background: #050505;
            border-right: 1px solid var(--border-dim);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .inspector {
            border-right: none;
            border-left: 1px solid var(--border-dim);
            background: #080808;
            padding: 20px;
        }

        .canvas {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            overflow: auto;
            cursor: crosshair;
        }

        #drop-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #222;
            transition: 0.3s;
        }

        #drop-zone.dragover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--gold-muted);
        }

        #uploaded-image {
            max-width: 100%;
            display: none;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .vibe-btn {
            background: transparent;
            border: 1px solid var(--gold-muted);
            color: var(--gold-muted);
            padding: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 10px;
        }

        .vibe-btn:hover {
            background: var(--gold-muted);
            color: black;
            box-shadow: 0 0 15px var(--gold-muted);
        }

        .coord-display {
            background: #111;
            border: 1px solid var(--gold-muted);
            padding: 15px;
            margin-top: 10px;
            font-family: monospace;
            color: var(--gold-bright);
            position: relative;
        }

        .coord-log {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #222;
            padding-top: 10px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #111;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VIBE JIVER</div>
        <div id="status" style="font-size: 14px; color: var(--gold-muted);">READY: DROP IMAGE</div>
    </header>

    <div class="main-layout">
        <aside>
            <button class="vibe-btn" onclick="resetCanvas()">Clear Canvas</button>
            <p style="font-size: 14px; color: #666;">Drag an image into the center to start mapping coordinates.</p>
        </aside>

        <section class="canvas" id="canvas-area">
            <div id="drop-zone">
                <p id="placeholder-text">DROP UI IMAGE HERE</p>
                <img id="uploaded-image" draggable="false">
            </div>
        </section>

        <aside class="inspector">
            <h3 style="color: var(--gold-muted); font-size: 18px; margin-top: 0;">INSPECTOR</h3>
            
            <div class="coord-display">
                X: <span id="val-x">0</span><br>
                Y: <span id="val-y">0</span>
            </div>

            <div style="margin-top: 15px;">
                <button class="vibe-btn" onclick="copyCoords()">Copy to Clipboard</button>
                <button class="vibe-btn" onclick="exportCSV()">Export CSV</button>
            </div>

            <p style="font-size: 12px; color: #666; margin-top: 20px;">HISTORY LOG:</p>
            <div class="coord-log" id="coord-log">
                No clicks recorded.
            </div>
        </aside>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const img = document.getElementById('uploaded-image');
        const placeholder = document.getElementById('placeholder-text');
        const canvasArea = document.getElementById('canvas-area');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');
        const log = document.getElementById('coord-log');
        const status = document.getElementById('status');
        
        let clickHistory = [];

        // Drag & Drop
        canvasArea.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        canvasArea.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        canvasArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    img.src = event.target.result;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                    status.innerText = "SYSTEM: HARVESTER ACTIVE";
                };
                reader.readAsDataURL(file);
            }
        });

        // Click Mapping
        canvasArea.addEventListener('mousedown', (e) => {
            if (img.style.display === 'block') {
                const rect = img.getBoundingClientRect();
                const x = Math.round(e.clientX - rect.left);
                const y = Math.round(e.clientY - rect.top);

                valX.innerText = x;
                valY.innerText = y;

                const entry = { x, y, time: new Date().toLocaleTimeString() };
                clickHistory.unshift(entry);
                updateLog();
            }
        });

        function updateLog() {
            if (clickHistory.length === 0) {
                log.innerHTML = "No clicks recorded.";
                return;
            }
            log.innerHTML = clickHistory.map(item => 
                `<div class="log-entry">[${item.time}] X: ${item.x}, Y: ${item.y}</div>`
            ).join('');
        }

        function copyCoords() {
            const text = `X: ${valX.innerText}, Y: ${valY.innerText}`;
            navigator.clipboard.writeText(text);
            status.innerText = "COPIED TO CLIPBOARD";
            setTimeout(() => status.innerText = "SYSTEM: HARVESTER ACTIVE", 2000);
        }

        function exportCSV() {
            if (clickHistory.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Time,X,Y\n" 
                + clickHistory.map(e => `${e.time},${e.x},${e.y}`).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "vibe_jiver_coords.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function resetCanvas() {
            img.src = "";
            img.style.display = 'none';
            placeholder.style.display = 'block';
            clickHistory = [];
            updateLog();
            valX.innerText = "0";
            valY.innerText = "0";
            status.innerText = "READY: DROP IMAGE";
        }
    </script>
</body>
</html>
