<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE JIVER | Master Command</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="master-container">
        <header class="vibe-header">
            <div class="logo">VIBE JIVER</div>
            <nav class="status-bar">SYSTEM READY | PHASE 1: FOUNDATION</nav>
        </header>

        <main class="vibe-workspace">
            <aside class="tool-belt">
                <button class="tool-btn active">Bulls-Eye Plotter</button>
                <button class="tool-btn">Vibe Mapper</button>
                <button class="tool-btn">Code Forge</button>
                <button class="tool-btn">PWA Packager</button>
            </aside>

            <section class="canvas-area">
                <div class="canvas-placeholder">
                    <h2>READY FOR INPUT</h2>
                    <p>Load your UI design to begin mapping features.</p>
                </div>
            </section>

            <aside class="inspector">
                <h3>COORDINATE LOG</h3>
                <div id="coord-list" class="data-feed">
                    </div>
            </aside>
        </main>
    </div>
</body>
</html>
