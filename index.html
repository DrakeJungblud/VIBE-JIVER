<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE JIVER | Bulls-Eye Edition</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="ducky.png">
    <meta name="theme-color" content="#c5a059">
    
    <style>
        :root {
            --bg-black: #000000;
            --gold-muted: #c5a059;
            --gold-bright: #e7c17d;
            --text-main: #ffffff;
            --border-dim: #333333;
            --font-size-main: 20px;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            font-size: var(--font-size-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        header {
            border-bottom: 2px solid var(--gold-muted);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: #0a0a0a; z-index: 10;
        }

        .logo { color: var(--gold-bright); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            flex-grow: 1;
            height: calc(100vh - 70px);
        }

        aside { background: #050505; border-right: 1px solid var(--border-dim); padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .inspector { border-right: none; border-left: 1px solid var(--border-dim); background: #080808; padding: 20px; }

        .canvas-container {
            position: relative;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            overflow: hidden;
            cursor: crosshair;
            display: flex; justify-content: center; align-items: center;
        }

        #image-wrapper { position: absolute; transform-origin: 0 0; display: none; z-index: 2; }
        #uploaded-image { display: block; user-select: none; pointer-events: auto; }

        /* The Hero Mascot Backdrop */
        #drop-zone-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1; transition: opacity 0.6s ease-in-out;
        }

        .hero-ducky {
            width: 500px;
            max-width: 85vw;
            height: auto;
            border-radius: 50%;
            border: 5px solid var(--gold-muted);
            box-shadow: 0 0 80px rgba(197, 160, 89, 0.25);
            margin-bottom: 30px;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.4)); }
            50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 50px rgba(197, 160, 89, 0.7)); }
            100% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.4)); }
        }

        .vibe-btn {
            background: transparent; border: 1px solid var(--gold-muted);
            color: var(--gold-muted); padding: 12px; cursor: pointer;
            font-size: 16px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            width: 100%; margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .vibe-btn:hover { 
            background: var(--gold-muted); 
            color: black; 
            box-shadow: 0 0 25px var(--gold-muted); 
            transform: translateY(-2px);
        }

            padding: 15px; margin
