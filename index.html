<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE JIVER | HUD Edition</title>
    <style>
        :root {
            --bg-black: #000000;
            --bg-surface: #0a0a0a;
            --gold-muted: #c5a059;
            --gold-bright: #e7c17d;
            --border: #222222;
            --font-main: 20px;
            --rail-width: 60px;
            --hud-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: var(--bg-black);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            font-size: var(--font-main);
            overflow: hidden;
        }

        /* --- THE HUD (TOP BAR) --- */
        #hud-top {
            position: fixed; top: 0; left: var(--rail-width); right: 0;
            height: var(--hud-height);
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--gold-muted);
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 20px; z-index: 100;
        }
        .hud-stat { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 10px; color: var(--gold-muted); text-transform: uppercase; letter-spacing: 2px; }
        .hud-value { font-family: monospace; color: var(--gold-bright); font-size: 18px; }

        /* --- SLIM ACTION RAIL (LEFT) --- */
        #action-rail {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: var(--rail-width);
            background: #050505;
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; z-index: 110;
            transition: width 0.3s ease;
            overflow: hidden;
        }
        #action-rail:hover { width: 220px; background: #0a0a0a; }
        
        .rail-btn {
            width: 45px; height: 45px;
            border: 1px solid var(--gold-muted);
            background: transparent; color: var(--gold-muted);
            margin-bottom: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; flex-shrink: 0;
        }
        .rail-btn:hover { background: var(--gold-muted); color: #000; box-shadow: 0 0 15px var(--gold-muted); }
        .rail-text { display: none; margin-left: 15px; font-size: 14px; text-transform: uppercase; white-space: nowrap; }
        #action-rail:hover .rail-text { display: inline; }
        #action-rail:hover .rail-btn { width: 190px; justify-content: flex-start; padding-left: 15px; }

        /* --- WORKSPACE --- */
        #workspace {
            position: absolute;
            top: var(--hud-height); left: var(--rail-width); right: 0; bottom: 60px;
            overflow: auto;
            display: flex; align-items: flex-start; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            padding: 40px;
        }

        #canvas-stack { position: relative; display: none; cursor: none; }
        #loaded-img { display: block; max-width: none; pointer-events: none; border: 1px solid #333; }
        
        #grid-canvas, #crosshair-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        #markers-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: auto;
        }

        /* --- MARKERS --- */
        .marker {
            position: absolute; width: 12px; height: 12px;
            border: 2px solid var(--gold-bright); border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px var(--gold-bright);
        }
        .marker-label {
            position: absolute; top: -22px; left: 10px;
            background: var(--gold-muted); color: #000;
            font-size: 10px; font-weight: bold; padding: 2px 5px;
            white-space: nowrap; border-radius: 2px;
        }

        /* --- POINT STRIP (BOTTOM) --- */
        #point-strip {
            position: fixed; bottom: 0; left: var(--rail-width); right: 0;
            height: 60px; background: rgba(5,5,5,0.9);
            border-top: 1px solid var(--gold-muted);
            display: flex; align-items: center; padding: 0 20px;
            gap: 10px; overflow-x: auto; z-index: 100;
        }
        .point-chip {
            background: #111; border: 1px solid var(--border);
            padding: 5px 12px; font-size: 12px; color: var(--gold-bright);
            white-space: nowrap; border-radius: 4px;
        }

        /* --- EXPORT DRAWER --- */
        #export-drawer {
            position: fixed; right: -400px; top: var(--hud-height); bottom: 0;
            width: 350px; background: #0a0a0a; border-left: 1px solid var(--gold-muted);
            z-index: 120; transition: right 0.4s ease;
            padding: 20px; display: flex; flex-direction: column;
        }
        #export-drawer.open { right: 0; }
        textarea {
            flex-grow: 1; background: #000; color: var(--gold-bright);
            border: 1px solid var(--border); padding: 10px;
            font-family: monospace; font-size: 12px; margin-bottom: 15px;
        }

        #drop-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

    <header id="hud-top">
        <div class="hud-stat">
            <span class="hud-label">Source Pixels</span>
            <span class="hud-value" id="hud-px">0, 0</span>
        </div>
        <div class="hud-stat">
            <span class="hud-label">Scale-Proof %</span>
            <span class="hud-value" id="hud-pct">0.00%, 0.00%</span>
        </div>
        <div style="font-size: 12px; color: var(--gold-muted); letter-spacing: 3px;">VIBE JIVER // STUDIO HUD</div>
    </header>

    <nav id="action-rail">
        <button class="rail-btn" onclick="document.getElementById('file-input').click()">
            🎯 <span class="rail-text">Load Image</span>
        </button>
        <button class="rail-btn" onclick="toggleGrid()">
            🌐 <span class="rail-text">Toggle Grid</span>
        </button>
        <button class="rail-btn" onclick="undoLast()">
            ↩️ <span class="rail-text">Undo</span>
        </button>
        <button class="rail-btn" onclick="toggleExport()">
            📄 <span class="rail-text">Export CSS</span>
        </button>
        <button class="rail-btn" onclick="copyAIPrompt()">
            🤖 <span class="rail-text">AI Prompt</span>
        </button>
        <div style="font-size: 9px; color: #444; margin-top: auto; margin-bottom: 15px; transform: rotate(-90deg);">RIFF-SHFTR © 2026</div>
    </nav>

    <main id="workspace">
        <div id="drop-overlay">
            <p style="color: var(--gold-muted); letter-spacing: 5px;">DROP IMAGE TO START</p>
        </div>

        <div id="canvas-stack">
            <img id="loaded-img" draggable="false">
            <canvas id="grid-canvas"></canvas>
            <div id="markers-layer"></div>
            <canvas id="crosshair-canvas"></canvas>
        </div>
    </main>

    <footer id="point-strip">
        <span style="font-size: 10px; color: var(--gold-muted); margin-right: 10px;">HISTORY:</span>
        <div id="strip-inner" style="display: flex; gap: 8px;"></div>
    </footer>

    <div id="export-drawer">
        <h3 style="color: var(--gold-muted); margin-bottom: 15px;">PRODUCTION CSS</h3>
        <textarea id="css-output" readonly></textarea>
        <button class="rail-btn" style="width: 100%;" onclick="copyCSS()">Copy CSS</button>
        <button class="rail-btn" style="width: 100%; margin-top: 10px;" onclick="toggleExport()">Close</button>
    </div>

    <input type="file" id="file-input" accept="image/*">

    <script>
        const img = document.getElementById('loaded-img');
        const stack = document.getElementById('canvas-stack');
        const mLayer = document.getElementById('markers-layer');
        const cCanvas = document.getElementById('crosshair-canvas');
        const gCanvas = document.getElementById('grid-canvas');
        const cCtx = cCanvas.getContext('2d');
        const gCtx = gCanvas.getContext('2d');
        
        let points = [];
        let showGrid = false;
        let imgW = 0, imgH = 0;

        document.getElementById('file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.src = ev.target.result;
                img.onload = () => {
                    imgW = img.naturalWidth;
                    imgH = img.naturalHeight;
                    // Lock internal canvas resolution to raw image pixels
                    [cCanvas, gCanvas].forEach(c => { c.width = imgW; c.height = imgH; });
                    stack.style.display = 'block';
                    document.getElementById('drop-overlay').style.display = 'none';
                    drawGrid();
                };
            };
            reader.readAsDataURL(file);
        });

        // Precision Crosshair Math
        mLayer.addEventListener('mousemove', e => {
            if (!imgW) return;
            const rect = mLayer.getBoundingClientRect();
            // Calculate position relative to the rendered image size
            const x = (e.clientX - rect.left) * (imgW / rect.width);
            const y = (e.clientY - rect.top) * (imgH / rect.height);
            
            updateHUD(x, y);
            drawCrosshair(x, y);
        });

        function drawCrosshair(x, y) {
            cCtx.clearRect(0, 0, imgW, imgH);
            cCtx.strokeStyle = '#c5a059';
            cCtx.lineWidth = 2; // Thicker for visibility
            cCtx.beginPath();
            cCtx.moveTo(0, y); cCtx.lineTo(imgW, y);
            cCtx.moveTo(x, 0); cCtx.lineTo(x, imgH);
            cCtx.stroke();
            cCtx.beginPath();
            cCtx.arc(x, y, 15, 0, Math.PI * 2);
            cCtx.stroke();
        }

        function updateHUD(x, y) {
            const px = Math.round(x);
            const py = Math.round(y);
            const pctX = ((x / imgW) * 100).toFixed(2);
            const pctY = ((y / imgH) * 100).toFixed(2);
            document.getElementById('hud-px').innerText = `${px}, ${py}`;
            document.getElementById('hud-pct').innerText = `${pctX}%, ${pctY}%`;
        }

        // Plotting Logic
        mLayer.addEventListener('mousedown', e => {
            if (!imgW) return;
            const rect = mLayer.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (imgW / rect.width);
            const y = (e.clientY - rect.top) * (imgH / rect.height);
            
            const p = {
                id: points.length + 1,
                pctX: ((x / imgW) * 100).toFixed(2),
                pctY: ((y / imgH) * 100).toFixed(2),
                pxX: Math.round(x),
                pxY: Math.round(y)
            };
            
            points.push(p);
            renderMarkers();
        });

        function renderMarkers() {
            mLayer.innerHTML = '';
            document.getElementById('strip-inner').innerHTML = '';
            points.forEach(p => {
                const m = document.createElement('div');
                m.className = 'marker';
                m.style.left = `${p.pctX}%`;
                m.style.top = `${p.pctY}%`;
                m.innerHTML = `<span class="marker-label">#${p.id}</span>`;
                mLayer.appendChild(m);

                const chip = document.createElement('div');
                chip.className = 'point-chip';
                chip.innerText = `#${p.id}: ${p.pctX}% / ${p.pctY}%`;
                document.getElementById('strip-inner').appendChild(chip);
            });
            updateExport();
        }

        function toggleGrid() {
            showGrid = !showGrid;
            gCanvas.style.opacity = showGrid ? '1' : '0';
        }

        function drawGrid() {
            gCtx.clearRect(0, 0, imgW, imgH);
            gCtx.strokeStyle = 'rgba(197, 160, 89, 0.1)';
            gCtx.lineWidth = 1;
            const step = 100;
            for(let x=0; x<=imgW; x+=step){ gCtx.moveTo(x,0); gCtx.lineTo(x,imgH); }
            for(let y=0; y<=imgH; y+=step){ gCtx.moveTo(0,y); gCtx.lineTo(imgW,y); }
            gCtx.stroke();
        }

        function undoLast() { points.pop(); renderMarkers(); }
        function toggleExport() { document.getElementById('export-drawer').classList.toggle('open'); }

        function updateExport() {
            const css = points.map(p => `.point-${p.id} { left: ${p.pctX}%; top: ${p.pctY}%; }`).join('\n');
            document.getElementById('css-output').value = css;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('css-output').value);
            alert("CSS Stored in Clipboard.");
        }

        function copyAIPrompt() {
            const data = points.map(p => `- ID ${p.id}: X ${p.pctX}%, Y ${p.pctY}%`).join('\n');
            const prompt = `UI Architecture Task: Use these coordinate percentages to place elements on an image:\n${data}`;
            navigator.clipboard.writeText(prompt);
            alert("AI Prompt Stored.");
        }
    </script>
</body>
</html>
